<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Encouragement by Empowerment</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <style>
    .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: var(--space-2xl); }
    .error-code { font-family: var(--font-display); font-size: clamp(5rem, 15vw, 10rem); font-weight: 800; background: var(--gradient-navy); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: var(--space-md); }
    .error-page h1 { font-size: var(--text-3xl); margin-bottom: var(--space-md); }
    .error-page p { color: var(--text-secondary); max-width: 480px; margin-bottom: var(--space-xl); }
  </style>
</head>
<body>
  <div class="error-page fade-up">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div style="display: flex; gap: var(--space-md); flex-wrap: wrap; justify-content: center;">
      <a href="index.html" class="btn btn-primary">Go Home</a>
      <a href="contact.html" class="btn btn-ghost">Contact Us</a>
    </div>
  </div>
  <script src="assets/js/theme.js" defer></script>
  <script src="assets/js/animations.js" defer></script>
</body>
</html>
